<!-- Theme boot — runs BEFORE stylesheet to avoid flash-of-wrong-theme.
     Order of precedence: localStorage choice > system prefers-color-scheme > light. -->
<script>
(function () {
  try {
    var stored = localStorage.getItem("sb-theme");
    var theme = stored || (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    document.documentElement.dataset.theme = theme;
    var meta = document.getElementById("sb-theme-color");
    if (meta) meta.setAttribute("content", theme === "dark" ? "#14110D" : "#F5F1E8");
  } catch (e) { /* localStorage blocked — fall through to CSS default */ }
})();
</script>
